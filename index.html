<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="CineScope — Discover trending movies, explore cast details, and build your personal watchlist with real-time data." />
    <meta name="keywords" content="movies, trending, watchlist, cinema, film discovery" />
    <title>CineScope | Discover Your Next Film</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap"
        rel="stylesheet" />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/animations.css" />
</head>

<body>

    <!-- ========== HEADER ========== -->
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo" aria-label="CineScope Home">
                <span class="logo-icon">◉</span>
                <span class="logo-text">CineScope</span>
            </a>

            <nav class="main-nav" id="main-nav" aria-label="Main navigation">
                <a href="index.html" class="nav-link active" data-page="home">Discover</a>
                <a href="watchlist.html" class="nav-link" data-page="watchlist">Watchlist <span class="badge"
                        id="nav-badge">0</span></a>
                <a href="search.html" class="nav-link" data-page="search">Search</a>
            </nav>

            <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- ========== HERO ========== -->
    <section class="hero" id="hero" aria-label="Featured film">
        <div class="hero-bg" id="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content" id="hero-content">
            <p class="hero-eyebrow">Now Trending</p>
            <h1 class="hero-title" id="hero-title">Loading…</h1>
            <p class="hero-synopsis" id="hero-synopsis"></p>
            <div class="hero-meta" id="hero-meta"></div>
            <div class="hero-actions">
                <button class="btn btn-primary" id="hero-details-btn">View Details</button>
                <button class="btn btn-ghost" id="hero-watchlist-btn">+ Add to Watchlist</button>
            </div>
        </div>
        <div class="hero-scroller" aria-hidden="true">
            <span>Scroll</span>
            <span class="scroll-arrow">↓</span>
        </div>
    </section>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="main-content">

        <!-- Genre Filter -->
        <section class="section-header" aria-label="Genre filter">
            <div class="container">
                <div class="section-top">
                    <h2 class="section-title">Trending Films</h2>
                    <div class="genre-filters" id="genre-filters" role="group" aria-label="Filter by genre">
                        <button class="filter-btn active" data-genre="all">All</button>
                    </div>
                </div>
                <div class="sort-bar">
                    <label for="sort-select" class="sort-label">Sort by:</label>
                    <select id="sort-select" class="sort-select" aria-label="Sort movies">
                        <option value="popularity">Popularity</option>
                        <option value="rating">Rating</option>
                        <option value="title">Title A–Z</option>
                        <option value="release">Release Date</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Movie Grid -->
        <section class="movies-section container" aria-live="polite" aria-label="Movie results">
            <div class="movie-grid" id="movie-grid">
                <!-- Cards injected by JS -->
                <div class="skeleton-card" aria-hidden="true"></div>
                <div class="skeleton-card" aria-hidden="true"></div>
                <div class="skeleton-card" aria-hidden="true"></div>
                <div class="skeleton-card" aria-hidden="true"></div>
                <div class="skeleton-card" aria-hidden="true"></div>
                <div class="skeleton-card" aria-hidden="true"></div>
            </div>
            <div class="load-more-wrap">
                <button class="btn btn-outline" id="load-more-btn">Load More Films</button>
            </div>
        </section>

        <!-- Now Playing Strip -->
        <section class="strip-section container" aria-label="Now playing in cinemas">
            <h2 class="section-title">In Cinemas Now</h2>
            <div class="film-strip" id="film-strip" role="list">
                <!-- Injected by JS -->
            </div>
        </section>

        <!-- Fun Fact / Quote Panel -->
        <section class="quote-panel" id="quote-panel" aria-label="Film trivia">
            <div class="container">
                <span class="quote-icon">🎬</span>
                <p class="quote-text" id="quote-text">Loading film fact…</p>
                <button class="btn-text" id="refresh-quote">New Fact ↻</button>
            </div>
        </section>

    </main>

    <!-- ========== MODAL ========== -->
    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
        <div class="modal" id="modal">
            <button class="modal-close" id="modal-close" aria-label="Close modal">✕</button>
            <div class="modal-content" id="modal-content">
                <!-- Injected by JS -->
            </div>
        </div>
    </div>

    <!-- ========== TOAST ========== -->
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

    <!-- ========== FOOTER ========== -->
    <footer class="site-footer" aria-label="Site footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <span class="logo-icon">◉</span>
                <span class="logo-text">CineScope</span>
            </div>
            <p class="footer-copy">
                Data powered by <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a> &amp;
                <a href="https://www.omdbapi.com" target="_blank" rel="noopener">OMDb</a>.
                Built by <strong>Kamohelo G Mejaele</strong> — WDD 330
            </p>
            <p class="footer-links">
                <a href="https://github.com/mejaelek" target="_blank" rel="noopener">GitHub</a> ·
                <a href="watchlist.html">Watchlist</a> ·
                <a href="search.html">Search</a>
            </p>
        </div>
    </footer>

    <!-- Scripts (ES Modules) -->
    <script type="module" src="js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Your personal CineScope watchlist — films you want to watch." />
    <title>My Watchlist | CineScope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/animations.css" />
</head>

<body>

    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo" aria-label="CineScope Home">
                <span class="logo-icon">◉</span>
                <span class="logo-text">CineScope</span>
            </a>
            <nav class="main-nav" id="main-nav" aria-label="Main navigation">
                <a href="index.html" class="nav-link" data-page="home">Discover</a>
                <a href="watchlist.html" class="nav-link active" data-page="watchlist">Watchlist <span class="badge"
                        id="nav-badge">0</span></a>
                <a href="search.html" class="nav-link" data-page="search">Search</a>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="main-content watchlist-main">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">My <em>Watchlist</em></h1>
                <p class="page-subtitle" id="watchlist-count">0 films saved</p>
                <div class="watchlist-controls">
                    <button class="btn btn-outline btn-sm" id="clear-watchlist-btn">Clear All</button>
                    <select class="sort-select" id="watchlist-sort" aria-label="Sort watchlist">
                        <option value="added">Recently Added</option>
                        <option value="title">Title A–Z</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>
            </div>

            <!-- Stats Bar -->
            <div class="stats-bar" id="stats-bar">
                <div class="stat-item">
                    <span class="stat-value" id="stat-total">0</span>
                    <span class="stat-label">Films</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-avg">—</span>
                    <span class="stat-label">Avg Rating</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-top-genre">—</span>
                    <span class="stat-label">Top Genre</span>
                </div>
            </div>

            <!-- Watchlist Grid -->
            <div class="movie-grid" id="watchlist-grid" aria-live="polite" aria-label="Watchlist films">
                <!-- Injected by JS -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="empty-state" hidden>
                <div class="empty-icon">🎞️</div>
                <h2>Your watchlist is empty</h2>
                <p>Start discovering films on the home page and add them here.</p>
                <a href="index.html" class="btn btn-primary">Discover Films</a>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
        <div class="modal" id="modal">
            <button class="modal-close" id="modal-close" aria-label="Close modal">✕</button>
            <div class="modal-content" id="modal-content"></div>
        </div>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <span class="logo-icon">◉</span>
                <span class="logo-text">CineScope</span>
            </div>
            <p class="footer-copy">Data powered by <a href="https://www.themoviedb.org" target="_blank"
                    rel="noopener">TMDB</a> &amp; <a href="https://www.omdbapi.com" target="_blank"
                    rel="noopener">OMDb</a>. Built by <strong>Kamohelo G Mejaele</strong> — WDD 330</p>
        </div>
    </footer>

    <script type="module" src="js/watchlist.js"></script>
</body>

</html>
